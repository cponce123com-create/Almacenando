kind = "web"
previewPath = "/"
title = "Legado"
version = "1.0.0"
id = "artifacts/legado"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19854

[services.development]
run = "pnpm --filter @workspace/legado run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/legado", "run", "build" ]
publicDir = "artifacts/legado/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19854"
BASE_PATH = "/"
