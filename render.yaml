services:
  - type: web
    name: almacenando-api
    runtime: node
    region: oregon
    plan: free

    # ---------------------------------------------------------------
    # Build: install deps + compile server with esbuild
    # Output: artifacts/api-server/dist/index.cjs
    # ---------------------------------------------------------------
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server build

    # ---------------------------------------------------------------
    # Start: run migrations first, then start the server.
    #
    # WHY inline and not "sh artifacts/api-server/start.sh":
    #   Render executes startCommand from the repo root. The script
    #   is equivalent to start.sh but written inline to avoid any
    #   shell path resolution issues on Render's runner.
    #
    # WHY "pnpm --filter @workspace/db migrate" and NOT "pnpm run migrate":
    #   The root package.json has NO "migrate" script. The script lives
    #   in lib/db/package.json under @workspace/db. The --filter flag
    #   targets that specific workspace package.
    #
    # WHY "node artifacts/api-server/dist/index.cjs" and NOT "node dist/index.cjs":
    #   esbuild outputs to artifacts/api-server/dist/index.cjs.
    #   There is no dist/ folder at the repo root.
    # ---------------------------------------------------------------
    startCommand: pnpm --filter @workspace/db migrate && node artifacts/api-server/dist/index.cjs

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false          # Set this in the Render dashboard
      - key: SESSION_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: APP_URL
        sync: false          # e.g. https://almacenando-api.onrender.com
      # Optional — only needed if email features are used
      - key: RESEND_API_KEY
        sync: false
      # Optional — only needed if Cloudinary file storage is used
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
